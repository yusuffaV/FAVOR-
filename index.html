<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favori İletişim ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Ana arka plan: krem beyaz */
  --bg:#f4f1eb;
  /* Kart yüzeyleri */
  --surface:#ffffff;
  --surface2:#faf8f4;
  --surface3:#f0ece3;
  /* Kenarlıklar */
  --border:#e4ddd0;
  --border2:#d5ccbc;
  /* Ana vurgu: turuncu-amber */
  --accent:#e07b39;
  --accent2:#f0914d;
  --glow:rgba(224,123,57,0.18);
  /* Durum renkleri */
  --green:#2e8b57;
  --red:#c0392b;
  --yellow:#d4801a;
  --purple:#6c5ce7;
  --teal:#0e8a7a;
  /* Yazı renkleri */
  --text:#2c2416;
  --text2:#7a6a54;
  --text3:#b5a898;
  /* Sidebar: koyu kahve-lacivert */
  --sidebar1:#1e2d3d;
  --sidebar2:#14202d;
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
input,select,textarea{background:var(--surface);border:1.5px solid var(--border2);color:var(--text);font-family:var(--fb);border-radius:8px;padding:9px 13px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;font-size:14px}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface);color:var(--text)}
button{cursor:pointer;font-family:var(--fb)}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(145deg,var(--sidebar2) 0%,var(--sidebar1) 50%,#2a3f54 100%);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .3s ease}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:min(400px,94vw);animation:slideIn .4s ease;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#f97316,#c0392b);display:inline-flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 6px 20px rgba(224,123,57,.4);margin-bottom:12px}
.login-logo-text{font-family:var(--fd);font-size:32px;letter-spacing:.06em;color:var(--accent)}
.login-logo-sub{font-size:12px;color:var(--text3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.login-tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--surface2);border-radius:10px;padding:4px}
.login-tab{flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s}
.login-tab.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.08);font-weight:700}
.login-field{margin-bottom:14px}
.login-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.login-btn{width:100%;padding:13px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .2s;box-shadow:0 4px 16px var(--glow)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(224,123,57,.35)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:20px}
.shake{animation:shake .4s ease}

/* ── LAYOUT ── */
#app{display:none;flex:1;height:100vh}
#app.visible{display:flex}
#sidebar{width:220px;background:linear-gradient(160deg,var(--sidebar1) 0%,var(--sidebar2) 100%);border-right:none;display:flex;flex-direction:column;flex-shrink:0;box-shadow:4px 0 20px rgba(0,0,0,.15);transition:transform .3s ease;z-index:100}
#logo-area{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#f97316,#c0392b);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(0,0,0,.3);flex-shrink:0}
.logo-text{font-family:var(--fd);font-size:22px;letter-spacing:.06em;color:#ffffff;line-height:1}
.logo-sub{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
#nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:rgba(255,255,255,.55);border-left:3px solid transparent;font-weight:400;font-size:13px;cursor:pointer;margin-bottom:2px;transition:all .18s;text-align:left}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:rgba(224,123,57,.25);color:#fff;border-left-color:var(--accent2);font-weight:700}
.nav-icon{font-size:16px;flex-shrink:0}
#clock-area{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
#clock{font-family:var(--fm);font-size:18px;color:#fff;font-weight:600}
#date-label{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
#user-badge{padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
.ubadge{font-size:12px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:6px}
.logout-btn{border:none;background:transparent;color:rgba(255,255,255,.35);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
#main{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}
#topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:11px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.back-btn{border:none;background:var(--surface2);color:var(--text2);width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .18s;flex-shrink:0;border:1px solid var(--border)}
.back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.back-btn:disabled{opacity:.3;cursor:default}
#topbar-title{font-size:15px;font-weight:700;color:var(--text)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
.abadge{background:var(--accent);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600}
#content{flex:1;padding:20px;overflow:auto}
/* HAMBURGER */
#ham-btn{display:none;border:none;background:var(--surface2);color:var(--text);width:32px;height:32px;border-radius:8px;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* ── CARDS ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;animation:slideIn .3s ease}
.card-bare{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;animation:slideIn .3s ease}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px}
.sc{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;animation:slideIn .3s ease}
.sbar{position:absolute;top:0;left:0;right:0;height:3px}
.sicon{font-size:22px;margin-bottom:5px}
.slabel{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:2px}
.sval{font-size:20px;font-family:var(--fm);font-weight:700}

/* ── TABLE ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 12px;background:var(--surface2);color:var(--text2);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:11px 12px;color:var(--text);white-space:nowrap}
.erow td{text-align:center;padding:32px;color:var(--text3)}

/* ── BADGE ── */
.badge{border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;font-family:var(--fm);display:inline-block}
.bg{background:#d4edda;color:#155724;border:1px solid #b8dcbf}
.br{background:#fde8e6;color:#922b21;border:1px solid #f5b7b1}
.by{background:#fdecd3;color:#935116;border:1px solid #f5cba7}
.bb{background:#d6e8fb;color:#1a4a7a;border:1px solid #aecdf0}
.bp{background:#e8e0fb;color:#4a2f8a;border:1px solid #c9b8f5}
.bt{background:#d0f0eb;color:#0e5c53;border:1px solid #9dddd5}

/* ── BUTTONS ── */
.btn{border:none;border-radius:9px;font-weight:600;padding:9px 18px;font-size:13px;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:5px;font-family:var(--fb)}
.bsm{padding:5px 10px!important;font-size:11px!important;border-radius:7px!important}
.bp-btn{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--glow)}.bp-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.bg-btn{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border2)}.bg-btn:hover{background:var(--surface3);color:var(--text)}
.bs-btn{background:#d4edda;color:#155724;border:1px solid #b8dcbf}.bs-btn:hover{background:#c1e2ca}
.bd-btn{background:#fde8e6;color:#922b21;border:1px solid #f5b7b1}.bd-btn:hover{background:#fbd5d2}
.be-btn{background:#d6e8fb;color:#1a4a7a;border:1px solid #aecdf0}.be-btn:hover{background:#c0dbf6}
.bpr-btn{background:#d0f0eb;color:#0e5c53;border:1px solid #9dddd5}.bpr-btn:hover{background:#b8e8e0}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(20,32,45,.55);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.mbox{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;width:min(640px,96vw);max-height:90vh;overflow:auto;padding:24px;animation:slideIn .22s ease;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mbox-lg{width:min(780px,96vw)}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtitle{font-size:16px;font-weight:700;color:var(--text)}
.mclose{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--surface3);color:var(--text)}
.field{margin-bottom:13px}
.flabel{display:block;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

/* ── SUMMARY CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.scard{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:14px 16px}
.sname{font-weight:700;margin-bottom:8px;font-size:14px;color:var(--text)}
.srow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.sdiv{border-top:1px solid var(--border);margin:6px 0}

/* ── TOTAL BAR ── */
.tbar{background:#fdecd3;border:1.5px solid #f5cba7;border-radius:10px;padding:10px 14px;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center}
.tbar.gbar{background:#d4edda;border-color:#b8dcbf}
.tbar-l{color:var(--text2);font-size:13px}
.tbar-v{font-family:var(--fm);font-weight:700;font-size:18px;color:var(--accent)}
.tbar.gbar .tbar-v{color:var(--green)}

/* ── CART ── */
.cart-area{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.cart-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.cart-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.cart-row:last-child{border-bottom:none}
.cart-row-name{flex:1;font-size:13px;font-weight:600}
.cart-row-total{font-size:13px;font-weight:700;font-family:var(--fm);color:var(--accent);min-width:80px;text-align:right}
.cart-del{background:#fde8e6;border:1px solid #f5b7b1;color:#922b21;border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer}
.cart-grand{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px;border-top:2px solid var(--border2)}
.add-row{display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px}
.add-row .field{margin-bottom:0;flex:1}
.add-row-btn{flex-shrink:0;padding:9px 16px!important}

/* ── AGING ── */
.age-f{background:#d4edda;color:#155724;border:1px solid #b8dcbf;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;font-family:var(--fm)}
.age-m{background:#fdecd3;color:#935116;border:1px solid #f5cba7;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;font-family:var(--fm)}
.age-o{background:#e8e0fb;color:#4a2f8a;border:1px solid #c9b8f5;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;font-family:var(--fm)}
.age-d{background:#fde8e6;color:#922b21;border:1px solid #f5b7b1;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;font-family:var(--fm)}
.einput{background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);font-family:var(--fm);border-radius:6px;padding:4px 8px;font-size:12px;width:105px;outline:none}
.einput:focus{border-color:var(--accent)}
.act-grp{display:flex;gap:4px;align-items:center}
.kalan-red{color:var(--red)!important;font-weight:700!important}

/* PERIOD TABS */
.period-tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--surface3);border-radius:10px;padding:4px;width:fit-content}
.period-tab{padding:7px 18px;border:none;border-radius:7px;background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s}
.period-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--glow);font-weight:700}

/* PRINT PANEL */
#print-panel{position:fixed;top:0;right:-420px;width:min(400px,100vw);height:100vh;background:var(--surface);box-shadow:-4px 0 20px rgba(0,0,0,.15);z-index:500;transition:right .3s ease;overflow:auto;padding:0;border-left:1.5px solid var(--border)}
#print-panel.open{right:0}
#print-panel-inner{padding:20px}
.pp-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.pp-title{font-size:15px;font-weight:700;color:var(--text)}
.pp-close{border:1px solid var(--border);background:var(--surface2);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.pp-close:hover{background:var(--surface3);color:var(--text)}

/* ── MISC ── */
.shead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.stitle{font-size:20px;font-weight:700;color:var(--text)}
.ssub{font-size:12px;color:var(--text2);margin-top:3px}
.gcol{display:flex;flex-direction:column;gap:16px}
.flex-g{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mono{font-family:var(--fm)}
.tg{color:var(--green)}.tr{color:var(--red)}.tb{color:#1a5276}.tp{color:var(--purple)}.tt{color:var(--teal)}
.fw7{font-weight:700}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.rrow:last-child{border-bottom:none}
.rtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.rtab{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s}
.rtab:hover{background:var(--surface2);color:var(--text)}
.rtab.act{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px var(--glow)}

/* PRINT */
@media print{
  body{background:#fff;color:#000;font-family:Arial,sans-serif;overflow:auto}
  *:not(#print-panel):not(#print-panel *){display:none!important}
  #print-panel{display:block!important;position:static!important;width:auto!important;height:auto!important;box-shadow:none!important;right:auto!important}
  .pp-header,.pp-close{display:none!important}
  #print-panel-inner{display:block!important;padding:0}
  div[style*="padding:16px 20px;border-top"]{display:none!important}
  .receipt{max-width:380px;margin:0 auto;padding:20px;font-size:13px}
  .receipt-logo{text-align:center;border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:12px}
  .receipt-logo h1{font-size:24px;letter-spacing:.05em}
  .receipt-logo p{font-size:11px;color:#555}
  .receipt-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #ccc}
  .receipt-total{display:flex;justify-content:space-between;padding:8px 0;font-size:16px;font-weight:700;border-top:2px solid #000;margin-top:6px}
}
.print-area{display:none}
@media(max-width:700px){
  body{overflow:auto}
  #app.visible{flex-direction:column;height:auto;min-height:100vh}
  #sidebar{position:fixed;top:0;left:0;transform:translateX(-100%);height:100vh;width:260px}
  #sidebar.mobile-open{transform:translateX(0)}
  #ham-btn{display:flex!important}
  .sidebar-overlay.active{display:block}
  #main{height:100vh;overflow:auto}
  #topbar{padding:10px 14px}
  #content{padding:14px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .dg2{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .g4{grid-template-columns:1fr 1fr}
  .sgrid{grid-template-columns:1fr}
  .shead{flex-direction:column;gap:10px}
  .period-tabs{width:100%;overflow-x:auto}
  .act-grp{flex-wrap:wrap}
  .twrap{font-size:12px}
  thead th{padding:7px 9px;font-size:9px}
  tbody td{padding:8px 9px}
  .mbox{padding:18px}
  #print-panel{width:100vw;right:-100vw}
  #print-panel.open{right:0}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">📱</div>
      <div class="login-logo-text">FAVORİ</div>
      <div class="login-logo-sub">ERP Sistemi v4.0</div>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('admin')">🔑 Admin Girişi</button>
      <button class="login-tab" onclick="switchLoginTab('personel')">👷 Personel Girişi</button>
    </div>
    <div class="login-field">
      <label class="login-label">Şifre</label>
      <input type="password" id="login-pass" placeholder="Şifrenizi girin..." onkeydown="if(event.key==='Enter')doLogin()">
    </div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
const PASSWORDS={admin:'favori2024',personel:'favori123'};
let currentRole=null;
let loginTab='admin';

function switchLoginTab(t){
  loginTab=t;

  $('login-pass').value='';
  $('login-pass').focus();
}

function doLogin(){
  const pass=$('login-pass').value;
  if(pass===PASSWORDS[loginTab]){
    currentRole=loginTab;
    $('login-screen').style.display='none';
    $('app').classList.add('visible');
    buildNav();
    $('role-label').textContent=loginTab==='admin'?'Admin':'Personel';
    $('role-icon').textContent=loginTab==='admin'?'🔑':'👷';
    $('top-user-badge').textContent=loginTab==='admin'?'🔑 Admin':'👷 Personel';
    curSec=loginTab==='admin'?'dashboard':'stoklar';
    history.replaceState({sec:curSec},'');

    // Verileri API'den yükle
    loadAll();
  } else {
    $('login-err').textContent='❌ Hatalı şifre, tekrar deneyin.';
    const box=document.querySelector('.login-box');
    box.classList.remove('shake');
    void box.offsetWidth;
    box.classList.add('shake');
    $('login-pass').value='';
  }
}

function logout(){
  if(!confirm('Çıkış yapmak istiyor musunuz?'))return;
  currentRole=null;
  $('app').classList.remove('visible');
  $('login-screen').style.display='flex';
  $('login-pass').value='';
  $('login-err').textContent='';
  history.replaceState({},'');
}

// ── ADMIN NAV ITEMS ──────────────────────────────────────────────────────────
const ADMIN_NAV=[
  {k:'dashboard',i:'⚡',l:'Özet'},
  {k:'malAlim',i:'📦',l:'Mal Alım'},
  {k:'malSatim',i:'🛒',l:'Mal Satım'},
  {k:'stoklar',i:'🗃️',l:'Stoklar & Yaşlandırma'},
  {k:'giderler',i:'💸',l:'Giderler'},
  {k:'musteriler',i:'👥',l:'Müşteriler'},

];
const PERSONEL_NAV=[{k:'stoklar',i:'🗃️',l:'Stoklar & Yaşlandırma'}];

function buildNav(){
  const items=currentRole==='admin'?ADMIN_NAV:PERSONEL_NAV;
  $('nav').innerHTML=items.map(n=>`<button class="nav-btn${n.k===curSec?' active':''}" data-section="${n.k}" onclick="navClick('${n.k}')"><span class="nav-icon">${n.i}</span>${n.l}</button>`).join('');
}

// ── API KATMANI ───────────────────────────────────────────────────────────────
const API = '/api';
async function apiGet(path){const r=await fetch(API+path);return r.json();}
async function apiPost(path,data){const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});return r.json();}
async function apiPut(path,data){const r=await fetch(API+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});return r.json();}
async function apiDel(path){const r=await fetch(API+path,{method:'DELETE'});return r.json();}

// ── HISTORY / BACK ────────────────────────────────────────────────────────────
let curSec='dashboard';
let history_stack=[];
let curRtab='satis';

function navClick(sec){
  if(sec===curSec)return;
  history_stack.push(curSec);
  curSec=sec;
  if(sec==='raporlar'&&!raporBasTarih){raporBasTarih=todayStr();raporBitTarih=todayStr();}
  updateNav();
  updateBackBtn();
  history.pushState({sec},'');
  render();
}

function goBack(){
  if(history_stack.length===0)return;
  curSec=history_stack.pop();
  updateNav();
  updateBackBtn();
  render();
}

function updateNav(){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.section===curSec));
  const labels={dashboard:'⚡ Özet',malAlim:'📦 Mal Alım',malSatim:'🛒 Mal Satım',stoklar:'🗃️ Stoklar & Yaşlandırma',giderler:'💸 Giderler',musteriler:'👥 Müşteriler',raporlar:'📊 Raporlar'};
  $('topbar-title').textContent=labels[curSec]||curSec;
}

function updateBackBtn(){
  const btn=$('back-btn');
  btn.disabled=history_stack.length===0;
  btn.style.opacity=history_stack.length===0?'0.3':'1';
}

// Browser back button
window.addEventListener('popstate',e=>{
  if(history_stack.length>0)goBack();
  else history.pushState({sec:curSec},'');
});

// Prevent accidental close
window.addEventListener('beforeunload',e=>{

  const sa=[...pAlis].sort((a,b)=>new Date(b.tarih+' '+(b.saat||'00:00'))-new Date(a.tarih+' '+(a.saat||'00:00'))).slice(0,8).map(a=>`<div class="rrow"><div><span style="color:var(--text2)">${a.saticiAd}</span><span style="color:var(--text3);font-size:11px;margin-left:6px">${fmtDT(a.tarih,a.saat)}</span></div><span class="mono fw7 tb">${fmt(a.toplam)}</span></div>`).join('')

function rAlim(){

  const saticiCards=S.saticilar.map(t=>{
    const k=t.toplamBorc-t.odenen;
    const satAlis=[...S.alislar.filter(a=>a.saticiId===t.id)].sort((a,b)=>b.tarih.localeCompare(a.tarih));
    const toplamAdet=satAlis.length;

          <button class="btn bsm bd-btn" onclick="event.stopPropagation();delSat(${t.id})" title="Satıcıyı sil">🗑️</button>
          <span id="satici-${t.id}-icon" style="color:var(--text3);font-size:18px;transition:transform .25s">▼</span>

// ── STOKLAR ───────────────────────────────────────────────────────────────────
function rStok(){
  const ag={f:0,m:0,o:0,d:0};
  S.urunler.forEach(u=>{const d=dSince(u.sonH);if(d<=30)ag.f++;else if(d<=90)ag.m++;else if(d<=180)ag.o++;else ag.d++;});
  const total_urun=S.urunler.length||1;
  const agBars=[
    {label:'Taze',count:ag.f,color:'#2e8b57',bg:'#d4edda'},
    {label:'Normal',count:ag.m,color:'#d4801a',bg:'#fdecd3'},
    {label:'Yaşlı',count:ag.o,color:'#6c5ce7',bg:'#e8e0fb'},
    {label:'Hareketsiz',count:ag.d,color:'#c0392b',bg:'#fde8e6'},
  ];
  const agViz=`<div class="card" style="margin-bottom:0">
    <div style="font-weight:700;margin-bottom:16px;font-size:14px">📊 Yaşlandırma Analizi</div>
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <div style="position:relative;width:120px;height:120px;flex-shrink:0">
        <svg viewBox="0 0 36 36" style="width:120px;height:120px;transform:rotate(-90deg)">
          ${(()=>{
            let offset=0;
            return agBars.map(b=>{
              const pct=b.count/total_urun*100;
              const dash=`${pct} ${100-pct}`;
              const el=`<circle cx="18" cy="18" r="15.9" fill="none" stroke="${b.color}" stroke-width="4" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" stroke-linecap="round"/>`;
              offset+=pct;
              return el;
            }).join('');
          })()}
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
          <div style="font-family:var(--fm);font-size:22px;font-weight:700;color:var(--text)">${S.urunler.length}</div>
          <div style="font-size:10px;color:var(--text2)">ürün</div>
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:10px;min-width:140px">
        ${agBars.map(b=>{
          const pct=S.urunler.length>0?Math.round(b.count/S.urunler.length*100):0;
          return `<div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <div style="display:flex;align-items:center;gap:7px">
                <span style="width:11px;height:11px;border-radius:50%;background:${b.color};display:inline-block;flex-shrink:0"></span>
                <span style="font-size:13px;font-weight:600;color:var(--text)">${b.label}</span>
              </div>
              <span style="font-family:var(--fm);font-size:13px;font-weight:700;color:${b.color}">${b.count}</span>
            </div>
            <div style="height:6px;background:${b.bg};border-radius:99px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${b.color};border-radius:99px;transition:width .4s"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
  const rows=S.urunler.map(u=>{
    const d=dSince(u.sonH);const[ac,al]=ageInfo(d);
    const mr=u.maliyet>0?((u.satisFiyat-u.maliyet)/u.maliyet*100).toFixed(1):0;
    const sc=u.stok<10?'var(--red)':u.stok<20?'var(--yellow)':'var(--green)';
    const isAdmin=currentRole==='admin';
    return `<tr>
      <td class="fw7">${u.ad}</td>
      <td>${u.kategori?`<span class="badge bt">${u.kategori}</span>`:'—'}</td>
      <td><span class="badge bb">${u.birim}</span></td>
      <td><span class="mono fw7" style="color:${sc}">${u.stok}</span></td>
      ${isAdmin?`<td><span class="mono">${fmt(u.maliyet)}</span></td>
      <td><span class="mono">${fmt(u.satisFiyat)}</span></td>
      <td><span class="badge ${mr>30?'bg':mr>10?'by':'br'}">%${mr}</span></td>`:'<td class="mono">—</td><td class="mono">—</td><td>—</td>'}
      <td>${fmtD(u.sonH)}</td>
      <td><span class="${ac}">${al}</span></td>
      ${isAdmin?`<td><div class="act-grp">
        <button class="btn bsm bpr-btn" onclick="printStok(${u.id})">🖨️</button>
        <button class="btn bsm be-btn" onclick="openEditUrun(${u.id})" title="Fiyatları & bilgileri düzenle">✏️</button>
        <button class="btn bsm bd-btn" onclick="delUrun(${u.id})">🗑️</button>
      </div></td>`:'<td>—</td>'}
    </tr>`;
  }).join('')||'<tr class="erow"><td colspan="10">Ürün bulunamadı</td></tr>';
  return `<div class="gcol">
  <div class="shead"><div><div class="stitle">Stoklar & Yaşlandırma</div><div class="ssub">${currentRole==='admin'?'Fiyatları satır üzerinde düzenle':'Stok durumunu görüntüle'}</div></div>
  ${currentRole==='admin'?'<button class="btn bp-btn" onclick="openUrun()">+ Yeni Ürün</button>':''}</div>
  ${agViz}
  <div class="card-bare"><div class="twrap"><table>
    <thead><tr><th>Ürün</th><th>Kategori</th><th>Birim</th><th>Stok</th><th>Alış Fiyatı</th><th>Satış Fiyatı</th><th>Marj</th><th>Son Hareket</th><th>Yaş</th><th>İşlemler</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div></div>`;
}

}

// ── RAPORLAR ──────────────────────────────────────────────────────────────────
function switchRtab(t){curRtab=t;render();}
function applyRaporFilter(){
  raporBasTarih=$('r-bas')?.value||'';
  raporBitTarih=$('r-bit')?.value||'';
  render();
}

function filterByDateRange(arr,key){
  if(!raporBasTarih&&!raporBitTarih) return arr;
  return arr.filter(x=>{
    const d=x[key];
    if(raporBasTarih&&d<raporBasTarih) return false;
    if(raporBitTarih&&d>raporBitTarih) return false;
    return true;
  });
}

function rRapor(){
  const tabs=[{k:'satis',l:'📈 Satış'},{k:'alis',l:'📦 Alış'},{k:'gider',l:'💸 Gider'},{k:'musteri',l:'👥 Müşteri'},{k:'stok',l:'🗃️ Stok'},{k:'karlilik',l:'💰 Kârlılık'}];

    <div style="flex:1;min-width:120px"><label style="font-size:10px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Başlangıç Tarihi</label>

    <div style="flex:1;min-width:120px"><label style="font-size:10px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Bitiş Tarihi</label>
    <input type="date" id="r-bit" value="${raporBitTarih}" style="margin:0"></div>
    <button class="btn bp-btn" onclick="applyRaporFilter()" style="white-space:nowrap">🔍 Uygula</button>
    <button class="btn bg-btn" onclick="raporBasTarih='';raporBitTarih='';render()" style="white-space:nowrap">✕ Temizle</button>
    <button class="btn bpr-btn" onclick="printMevcutRapor()" style="white-space:nowrap">🖨️ Raporu Yazdır</button>

  const fSat=filterByDateRange(S.satislar,'tarih');

  let b='';
  if(curRtab==='satis'){
    const top=fSat.reduce((a,x)=>a+x.toplam,0),od=fSat.reduce((a,x)=>a+(x.odened||0),0);

    const mGrp={};
    fSat.forEach(s=>{if(!mGrp[s.musteriId])mGrp[s.musteriId]={ad:s.musteriAd,satislar:[],toplam:0,odenen:0};mGrp[s.musteriId].satislar.push(s);mGrp[s.musteriId].toplam+=s.toplam;mGrp[s.musteriId].odenen+=s.odened||0;});
    const musteriDetay=Object.values(mGrp).sort((a,b)=>b.toplam-a.toplam).map((mg,i)=>{
      const k=mg.toplam-mg.odenen;

            <div style="font-weight:700;font-size:14px">👤 ${mg.ad}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:3px">${mg.satislar.length} satış · Toplam: <span class="mono fw7">${fmt(mg.toplam)}</span> · Ödenen: <span class="mono" style="color:var(--green)">${fmt(mg.odenen)}</span> · Kalan: <span class="mono kalan-red">${fmt(k)}</span></div>
          </div>
          <span id="rsat-${i}-icon" style="color:var(--text3);font-size:16px;transition:transform .25s">▼</span>
        </div>

            <div><span style="color:var(--text2)">${fmtDT(s.tarih,s.saat)}</span> — <span style="font-weight:600">${s.urunAd}</span> ${s.miktar} ${u?.birim||''}</div>
            <div style="display:flex;align-items:center;gap:8px"><span class="mono fw7 tg">${fmt(s.toplam)}</span>${bOd(s.odemeDurumu)}<button class="btn bsm bpr-btn" onclick="printRec('satis',${s.id})">🖨️</button></div>

      <div class="sc"><div class="sbar" style="background:var(--red)"></div><div class="slabel">Bekleyen</div><div class="sval kalan-red">${fmt(top-od)}</div></div>

  } else if(curRtab==='alis'){
    const top=fAlis.reduce((a,x)=>a+x.toplam,0),od=fAlis.reduce((a,x)=>a+(x.odened||0),0);
    // Satıcı bazında grupla
    const sGrp={};
    fAlis.forEach(a=>{if(!sGrp[a.saticiId])sGrp[a.saticiId]={ad:a.saticiAd,alislar:[],toplam:0,odenen:0};sGrp[a.saticiId].alislar.push(a);sGrp[a.saticiId].toplam+=a.toplam;sGrp[a.saticiId].odenen+=a.odened||0;});
    const saticiDetay=Object.values(sGrp).sort((a,b)=>b.toplam-a.toplam).map((sg,i)=>{
      const k=sg.toplam-sg.odenen;
      const sira=[...sg.alislar].sort((a,b)=>b.tarih.localeCompare(a.tarih));
      return `<div class="card" style="padding:0;overflow:hidden;margin-bottom:6px">

            <div style="font-weight:700;font-size:14px">🏭 ${sg.ad}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:3px">${sg.alislar.length} alış · Toplam: <span class="mono fw7">${fmt(sg.toplam)}</span> · Ödenen: <span class="mono" style="color:var(--green)">${fmt(sg.odenen)}</span> · Kalan borç: <span class="mono kalan-red">${fmt(k)}</span></div>
          </div>
          <span id="ralis-${i}-icon" style="color:var(--text3);font-size:16px;transition:transform .25s">▼</span>
        </div>
        <div id="ralis-${i}" style="display:none;padding:0 14px 10px">
          ${sira.map(a=>{
            const urunSatir=a.urunler?a.urunler.map(x=>`<div style="font-size:11px;color:var(--text2);padding:2px 6px">↳ ${x.urunAd} × ${x.miktar} ${x.birim} = ${fmt(x.toplam)}</div>`).join(''):'';

              <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;font-size:12px">
                <div><span style="color:var(--text2)">${fmtDT(a.tarih,a.saat)}</span></div>
                <div style="display:flex;align-items:center;gap:8px"><span class="mono fw7 tb">${fmt(a.toplam)}</span>${bOd(a.odemeDurumu)}<button class="btn bsm bpr-btn" onclick="printRec('alis',${a.id})">🖨️</button></div>
              </div>
              ${urunSatir?`<div style="border-top:1px solid var(--border);padding:4px 0">${urunSatir}</div>`:''}

          }).join('')}
        </div>
      </div>`;
    }).join('')||'<div style="color:var(--text3);text-align:center;padding:20px">Veri yok</div>';
    b=`<div class="stat-grid" style="margin-bottom:14px">
      <div class="sc"><div class="sbar" style="background:var(--accent)"></div><div class="slabel">Toplam Alış</div><div class="sval tb">${fmt(top)}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--green)"></div><div class="slabel">Ödenen</div><div class="sval tg">${fmt(od)}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--red)"></div><div class="slabel">Kalan Borç</div><div class="sval kalan-red">${fmt(top-od)}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--purple)"></div><div class="slabel">Adet</div><div class="sval tp">${fAlis.length}</div></div>
    </div>
    <div style="font-weight:700;margin-bottom:10px;font-size:13px">Satıcı Bazında Detay — tıklayarak açın</div>
    ${saticiDetay}`;
  } else if(curRtab==='gider'){
    const top=fGid.reduce((a,x)=>a+x.tutar,0);
    const grp={};fGid.forEach(g=>{grp[g.kategori]=(grp[g.kategori]||0)+g.tutar;});
    const grpH=Object.entries(grp).sort((a,b2)=>b2[1]-a[1]).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${k}</span><span class="mono tr fw7">${fmt(v)}</span></div>`).join('')||'<div style="color:var(--text3);padding:14px 0;text-align:center">Veri yok</div>';
    b=`<div class="dg2" style="margin-bottom:14px">
      <div class="sc"><div class="sbar" style="background:var(--red)"></div><div class="slabel">Toplam Gider</div><div class="sval tr">${fmt(top)}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--purple)"></div><div class="slabel">Kayıt</div><div class="sval tp">${fGid.length}</div></div>
    </div><div class="card"><div class="fw7" style="margin-bottom:9px">Kategoriye Göre Dağılım</div>${grpH}</div>`;
  } else if(curRtab==='musteri'){
    b=`<div class="card-bare"><div class="twrap"><table><thead><tr><th>Müşteri</th><th>Toplam</th><th>Ödenen</th><th style="color:var(--red)">Kalan Alacak</th><th>Durum</th><th>Fiş</th></tr></thead>
    <tbody>${[...S.musteriler].sort((a,b2)=>(b2.toplamBorc-b2.odenen)-(a.toplamBorc-a.odenen)).map(m=>{const k=m.toplamBorc-m.odenen;return `<tr>
      <td class="fw7">${m.ad}</td><td class="mono">${fmt(m.toplamBorc)}</td><td class="mono tg">${fmt(m.odenen)}</td>
      <td class="mono kalan-red">${fmt(k)}</td>
      <td><span class="badge ${k===0?'bg':k===m.toplamBorc?'br':'by'}">${k===0?'Kapandı':k===m.toplamBorc?'Ödenmedi':'Kısmi'}</span></td>
      <td><button class="btn bsm bpr-btn" onclick="printMusteri(${m.id})">🖨️</button></td>
    </tr>`;}).join('')||'<tr class="erow"><td colspan="6">Veri yok</td></tr>'}</tbody></table></div></div>`;
  } else if(curRtab==='stok'){
    const sv=S.urunler.reduce((a,u)=>a+u.stok*u.maliyet,0);
    b=`<div class="stat-grid" style="margin-bottom:14px">
      <div class="sc"><div class="sbar" style="background:var(--accent)"></div><div class="slabel">Stok Değeri</div><div class="sval tb">${fmt(sv)}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--green)"></div><div class="slabel">Çeşit</div><div class="sval tg">${S.urunler.length}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--red)"></div><div class="slabel">Kritik (&lt;10)</div><div class="sval tr">${S.urunler.filter(u=>u.stok<10).length}</div></div>
    </div>
    <div class="card-bare"><div class="twrap"><table><thead><tr><th>Ürün</th><th>Stok</th><th>Alış Fiyatı</th><th>Stok Değeri</th><th>Son Hareket</th><th>Yaş</th><th>Fiş</th></tr></thead>
    <tbody>${[...S.urunler].sort((a,b2)=>dSince(b2.sonH)-dSince(a.sonH)).map(u=>{const d=dSince(u.sonH);const[ac,al]=ageInfo(d);return `<tr>
      <td class="fw7">${u.ad}</td>
      <td class="mono" style="color:${u.stok<10?'var(--red)':u.stok<20?'var(--yellow)':'var(--green)'}">${u.stok} ${u.birim}</td>
      <td class="mono">${fmt(u.maliyet)}</td><td class="mono tb">${fmt(u.stok*u.maliyet)}</td>
      <td>${fmtD(u.sonH)}</td><td><span class="${ac}">${al}</span></td>
      <td><button class="btn bsm bpr-btn" onclick="printStok(${u.id})">🖨️</button></td>
    </tr>`;}).join('')}</tbody></table></div></div>`;
  } else if(curRtab==='karlilik'){
    const ciro=fSat.reduce((a,x)=>a+x.toplam,0),mal=fAlis.reduce((a,x)=>a+x.toplam,0),gid=fGid.reduce((a,x)=>a+x.tutar,0);
    const brut=ciro-mal,net=brut-gid,mg=ciro>0?(net/ciro*100).toFixed(1):0;
    const uk=S.urunler.map(u=>{
      const sls=fSat.filter(s=>s.urunId===u.id);
      const cv=sls.reduce((a,s)=>a+s.toplam,0);
      const mc=sls.reduce((a,s)=>a+s.miktar*u.maliyet,0);
      return{ad:u.ad,adet:sls.reduce((a,s)=>a+s.miktar,0),ciro:cv,maliyet:mc,kar:cv-mc};
    }).filter(x=>x.ciro>0).sort((a,b2)=>b2.kar-a.kar);
    b=`<div class="stat-grid" style="margin-bottom:14px">
      <div class="sc"><div class="sbar" style="background:var(--green)"></div><div class="slabel">Ciro</div><div class="sval tg">${fmt(ciro)}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--accent)"></div><div class="slabel">Brüt Kâr</div><div class="sval tb">${fmt(brut)}</div></div>
      <div class="sc"><div class="sbar" style="background:${net>=0?'var(--teal)':'var(--red)'}"></div><div class="slabel">Net Kâr</div><div class="sval" style="color:${net>=0?'var(--teal)':'var(--red)'}">${fmt(net)}</div></div>
      <div class="sc"><div class="sbar" style="background:var(--purple)"></div><div class="slabel">Net Marjı</div><div class="sval tp">%${mg}</div></div>
    </div>${uk.length?`<div class="card-bare"><div class="twrap"><table><thead><tr><th>Ürün</th><th>Adet</th><th>Ciro</th><th>Maliyet</th><th>Kâr</th></tr></thead>
    <tbody>${uk.map(x=>`<tr><td class="fw7">${x.ad}</td><td class="mono">${x.adet}</td><td class="mono tg">${fmt(x.ciro)}</td><td class="mono tr">${fmt(x.maliyet)}</td><td class="mono fw7 ${x.kar>=0?'tg':'tr'}">${fmt(x.kar)}</td></tr>`).join('')}</tbody></table></div></div>`:'<div class="card" style="color:var(--text3);text-align:center;padding:28px">Satış verisi yok</div>'}`;
  }

  return `<div class="gcol">
  <div class="shead"><div><div class="stitle">Raporlar</div><div class="ssub">Tarih aralığı seçerek filtreleyin</div></div></div>
  ${dateBar}
  <div class="rtabs">${th}</div>
  ${raporBasTarih||raporBitTarih?`<div style="font-size:12px;color:var(--text2);margin-bottom:4px">📅 Gösterilen: <b>${tarihBilgi}</b></div>`:''}
  ${b}</div>`;
}

function printMevcutRapor(){
  const tabLabels={satis:'SATIŞ RAPORU',alis:'ALIŞ RAPORU',gider:'GİDER RAPORU',musteri:'MÜŞTERİ RAPORU',stok:'STOK RAPORU',karlilik:'KÂRLILIK RAPORU'};
  const tarihBilgi=raporBasTarih||raporBitTarih?`${raporBasTarih?fmtD(raporBasTarih):'Başlangıç'} – ${raporBitTarih?fmtD(raporBitTarih):'Bugün'}`:'Tüm Tarihler';
  const fSat=filterByDateRange(S.satislar,'tarih');
  const fAlis=filterByDateRange(S.alislar,'tarih');
  const fGid=filterByDateRange(S.giderler,'tarih');
  let lines=[];
  if(curRtab==='satis'){
    const top=fSat.reduce((a,x)=>a+x.toplam,0),od=fSat.reduce((a,x)=>a+(x.odened||0),0);
    lines=[['Tarih Aralığı',tarihBilgi],['Toplam Ciro',fmt(top)],['Tahsil Edilen',fmt(od)],['Bekleyen Alacak',fmt(top-od)],['Satış Adedi',fSat.length]];
  } else if(curRtab==='alis'){
    const top=fAlis.reduce((a,x)=>a+x.toplam,0),od=fAlis.reduce((a,x)=>a+(x.odened||0),0);
    lines=[['Tarih Aralığı',tarihBilgi],['Toplam Alış',fmt(top)],['Ödenen',fmt(od)],['Kalan Borç',fmt(top-od)],['Alış Adedi',fAlis.length]];
  } else if(curRtab==='gider'){
    const top=fGid.reduce((a,x)=>a+x.tutar,0);
    lines=[['Tarih Aralığı',tarihBilgi],['Toplam Gider',fmt(top)],['Kayıt Sayısı',fGid.length]];
  } else if(curRtab==='musteri'){
    lines=[['Müşteri Sayısı',S.musteriler.length],['Toplam Alacak',fmt(S.musteriler.reduce((a,m)=>a+(m.toplamBorc-m.odenen),0))]];
  } else if(curRtab==='stok'){
    lines=[['Ürün Çeşidi',S.urunler.length],['Stok Değeri',fmt(S.urunler.reduce((a,u)=>a+u.stok*u.maliyet,0))],['Kritik Stok',S.urunler.filter(u=>u.stok<10).length]];
  } else if(curRtab==='karlilik'){
    const ciro=fSat.reduce((a,x)=>a+x.toplam,0),mal=fAlis.reduce((a,x)=>a+x.toplam,0),gid=fGid.reduce((a,x)=>a+x.tutar,0);
    lines=[['Tarih Aralığı',tarihBilgi],['Ciro',fmt(ciro)],['Brüt Kâr',fmt(ciro-mal)],['Net Kâr',fmt(ciro-mal-gid)],['Net Marj',`%${ciro>0?((ciro-mal-gid)/ciro*100).toFixed(1):0}`]];
  }
  doPrint(buildReceipt(lines,tabLabels[curRtab]||'RAPOR',tarihBilgi));
}

// ── SEPET (Multi-product alis) ─────────────────────────────────────────────────
function renderSepet(){

function switchAlisTab(t){
  const secili=document.getElementById('alis-tab-secili');
  const yeni=document.getElementById('alis-tab-yeni');
  const btnS=document.getElementById('tab-secili');
  const btnY=document.getElementById('tab-yeni');
  if(t==='secili'){
    secili.style.display='block';yeni.style.display='none';
    btnS.style.background='var(--accent)';btnS.style.color='#fff';btnS.style.fontWeight='700';
    btnY.style.background='transparent';btnY.style.color='var(--text2)';btnY.style.fontWeight='600';
  } else {
    secili.style.display='none';yeni.style.display='block';
    btnY.style.background='var(--accent)';btnY.style.color='#fff';btnY.style.fontWeight='700';
    btnS.style.background='transparent';btnS.style.color='var(--text2)';btnS.style.fontWeight='600';
  }
}

function toggleAlisOdeme(v){
  const alan=document.getElementById('alis-kismi-alan');
  if(alan)alan.style.display=(v==='kismi')?'block':'none';
  updateAlisKalanGoster();
}
function updateAlisKalanGoster(){
  const toplam=alisSepet.reduce((a,x)=>a+x.toplam,0);
  const odenen=parseFloat(document.getElementById('f-odeme-tutar')?.value)||0;
  const kalan=toplam-odenen;
  const el=document.getElementById('alis-kalan-goster');
  if(el&&toplam>0)el.innerHTML=`Toplam: <b>${fmt(toplam)}</b> — Ödenen: <b style="color:var(--green)">${fmt(odenen)}</b> — Kalan: <b style="color:var(--red)">${fmt(Math.max(0,kalan))}</b>`;
}

async function alisYeniSaticiEkle(){
  const ad=document.getElementById('f-yeni-satici-ad')?.value?.trim();
  const tel=document.getElementById('f-yeni-satici-tel')?.value?.trim();
  if(!ad)return alert('Firma adı zorunludur.');
  
  // Satıcıyı API'ye kaydet
  const yeni=await apiPost('/saticilar',{ad,tel:tel||''});
  S.saticilar.push(yeni);
  
  const sel=document.getElementById('f-satId');
  if(sel){const opt=document.createElement('option');opt.value=yeni.id;opt.text=yeni.ad;sel.appendChild(opt);sel.value=yeni.id;}
  
  const urunAd=document.getElementById('f-ys-urun-ad')?.value?.trim();
  const urunKat=document.getElementById('f-ys-urun-kat')?.value?.trim();
  const urunBirim=document.getElementById('f-ys-urun-birim')?.value;
  const urunStok=parseFloat(document.getElementById('f-ys-urun-stok')?.value)||0;
  const urunMaliyet=parseFloat(document.getElementById('f-ys-urun-maliyet')?.value)||0;
  const urunSatis=parseFloat(document.getElementById('f-ys-urun-satis')?.value)||0;
  if(urunAd&&urunStok>0){
    const yeniUrun=await apiPost('/urunler',{ad:urunAd,kategori:urunKat||'',birim:urunBirim||'Adet',stok:urunStok,maliyet:urunMaliyet,satisFiyat:urunSatis});
    S.urunler.push(yeniUrun);
    if(urunStok>0&&urunMaliyet>0){
      alisSepet.push({urunId:yeniUrun.id,urunAd:yeniUrun.ad,birim:yeniUrun.birim,miktar:urunStok,birimFiyat:urunMaliyet,toplam:urunStok*urunMaliyet});
      renderSepet();
    }
    const urunSel=document.getElementById('a-urunId');
    if(urunSel){const o=document.createElement('option');o.value=yeniUrun.id;o.text=`${yeniUrun.ad} (${yeniUrun.stok} ${yeniUrun.birim})`;urunSel.appendChild(o);}
  }
  switchAlisTab('secili');
  ['f-yeni-satici-ad','f-yeni-satici-tel','f-ys-urun-ad','f-ys-urun-kat','f-ys-urun-stok','f-ys-urun-maliyet','f-ys-urun-satis'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const btn=document.querySelector('[onclick="alisYeniSaticiEkle()"]');
  if(btn){const orig=btn.innerHTML;btn.innerHTML=`✅ ${ad} eklendi!`;setTimeout(()=>btn.innerHTML=orig,2000);}
  await loadAll();
}

let satisSepet=[];

function renderSatisSepet(){
  const s=$('satis-sepet-area');if(!s)return;
  if(satisSepet.length===0){s.innerHTML='<div style="color:var(--text3);font-size:13px;text-align:center;padding:14px">Henüz ürün eklenmedi</div>';return;}
  const grandTotal=satisSepet.reduce((a,x)=>a+x.toplam,0);
  s.innerHTML=satisSepet.map((x,i)=>`<div class="cart-row">
    <div class="cart-row-name">${x.urunAd}<div style="font-size:11px;color:var(--text3)">${x.miktar} ${x.birim} × ${fmt(x.satisFiyat)}</div></div>
    <div class="cart-row-total">${fmt(x.toplam)}</div>
    <button class="cart-del" onclick="satisSepetSil(${i})">✕</button>
  </div>`).join('')+`<div class="cart-grand"><span style="font-weight:700;font-size:14px">TOPLAM</span><span class="mono fw7" style="font-size:18px;color:var(--green)">${fmt(grandTotal)}</span></div>`;
}

function satisEkle(){
  const uId=Number(gv('s-urunId'));
  const mkt=gn('s-miktar');
  const fiy=gn('s-fiyat');
  if(!uId||!mkt||!fiy)return alert('Ürün, miktar ve fiyat zorunludur.');
  const urun=S.urunler.find(u=>u.id===uId);
  const mevcutSepetMiktar=satisSepet.filter(x=>x.urunId===uId).reduce((a,x)=>a+x.miktar,0);
  if(urun.stok<mkt+mevcutSepetMiktar)return alert(`Stok yetersiz! Mevcut: ${urun.stok} ${urun.birim}`);
  satisSepet.push({urunId:uId,urunAd:urun.ad,birim:urun.birim,miktar:mkt,satisFiyat:fiy,toplam:mkt*fiy});
  $('s-urunId').value='';$('s-miktar').value='';$('s-fiyat').value='';
  renderSatisSepet();
}

function satisSepetSil(i){satisSepet.splice(i,1);renderSatisSepet();}

async function saveAlis(){
  const sId=Number(gv('f-satId'));
  if(!sId)return alert('Satıcı seçiniz.');
  if(alisSepet.length===0)return alert('En az bir ürün ekleyin.');
  const sat=S.saticilar.find(t=>t.id===sId);
  const toplam=alisSepet.reduce((a,x)=>a+x.toplam,0);
  const od=gv('f-odeme');
  const saat=gv('f-saat')||nowTime();
  let odenenTutar=0;let odemeDurumu=od;
  if(od==='odendi'){odenenTutar=toplam;}
  else if(od==='kismi'){
    odenenTutar=parseFloat(document.getElementById('f-odeme-tutar')?.value)||0;
    if(odenenTutar<=0)return alert('Kısmi ödeme tutarını girin.');
    if(odenenTutar>=toplam){odenenTutar=toplam;odemeDurumu='odendi';}
  }
  for(const x of alisSepet){
    const urun=S.urunler.find(u=>u.id===x.urunId);
    if(urun){urun.stok+=x.miktar;urun.maliyet=x.birimFiyat;urun.sonH=todayStr();await apiPut('/urunler/'+urun.id,urun);}
  }
  const yeni=await apiPost('/alislar',{tarih:gv('f-tarih'),saat,saticiId:sId,saticiAd:sat.ad,urunler:[...alisSepet],toplam,odemeDurumu,odened:odenenTutar,aciklama:gv('f-aciklama')});
  S.alislar.push(yeni);
  sat.toplamBorc+=toplam;sat.odenen+=odenenTutar;
  await apiPut('/saticilar/'+sId,sat);
  closeM();await loadAll();
}

async function saveSatis(){
  const mId=Number(gv('f-musId'));
  if(!mId)return alert('Lütfen müşteri seçin.');
  if(satisSepet.length===0)return alert('En az bir ürün ekleyin.');
  const mus=S.musteriler.find(m=>m.id===mId);
  const toplam=satisSepet.reduce((a,x)=>a+x.toplam,0);
  const od=gv('f-odeme');
  const tarih=gv('f-tarih');const saat=gv('f-saat')||nowTime();
  let odenenTutar=0;let odemeDurumu=od;
  if(od==='odendi'){odenenTutar=toplam;}
  else if(od==='kismi'){
    odenenTutar=parseFloat(document.getElementById('f-satis-odeme-tutar')?.value)||0;
    if(odenenTutar<=0)return alert('Kısmi ödeme tutarını girin.');
    if(odenenTutar>=toplam){odenenTutar=toplam;odemeDurumu='odendi';}
  }
  for(const x of satisSepet){
    const urun=S.urunler.find(u=>u.id===x.urunId);
    const odenenX=odemeDurumu==='odendi'?x.toplam:Math.round(odenenTutar*(x.toplam/toplam)*100)/100;
    const yeni=await apiPost('/satislar',{tarih,saat,musteriId:mId,musteriAd:mus.ad,urunId:x.urunId,urunAd:x.urunAd,miktar:x.miktar,satisFiyat:x.satisFiyat,toplam:x.toplam,odemeDurumu,odened:odenenX,aciklama:gv('f-aciklama')});
    S.satislar.push(yeni);
    if(urun){urun.stok-=x.miktar;urun.sonH=todayStr();await apiPut('/urunler/'+urun.id,urun);}
  }
  mus.toplamBorc+=toplam;mus.odenen+=odenenTutar;
  await apiPut('/musteriler/'+mId,mus);
  closeM();await loadAll();
}

async function delRec(type,id){
  const label=type==='alis'?'Bu alış kaydını':type==='satis'?'Bu satış kaydını':'Bu gideri';
  onayModal(label+' silmek istiyor musunuz?', async()=>{
    if(type==='alis'){
      const a=S.alislar.find(x=>x.id===id);
      if(a){
        for(const x of (a.urunler||[])){const u=S.urunler.find(y=>y.id===x.urunId);if(u){u.stok=Math.max(0,u.stok-x.miktar);await apiPut('/urunler/'+u.id,u);}}
        const t=S.saticilar.find(x=>x.id===a.saticiId);if(t){t.toplamBorc=Math.max(0,t.toplamBorc-a.toplam);t.odenen=Math.max(0,t.odenen-(a.odened||0));await apiPut('/saticilar/'+t.id,t);}
        await apiDel('/alislar/'+id);
      }
    } else if(type==='satis'){
      const s=S.satislar.find(x=>x.id===id);
      if(s){
        const u=S.urunler.find(x=>x.id===s.urunId);if(u){u.stok+=s.miktar;await apiPut('/urunler/'+u.id,u);}
        const m=S.musteriler.find(x=>x.id===s.musteriId);if(m){m.toplamBorc=Math.max(0,m.toplamBorc-s.toplam);m.odenen=Math.max(0,m.odenen-(s.odened||0));await apiPut('/musteriler/'+m.id,m);}
        await apiDel('/satislar/'+id);
      }
    } else if(type==='gider'){
      await apiDel('/giderler/'+id);
    }
    await loadAll();
  });
}

  const now=new Date().toLocaleString('tr-TR');

  const faturaBloklar=alislar.map((a,i)=>{
    const urunSatirlari=a.urunler
      ? a.urunler.map(x=>`<div class="receipt-row" style="padding-left:12px"><span>↳ ${x.urunAd} × ${x.miktar} ${x.birim}</span><span><b>${fmt(x.toplam)}</b></span></div>`).join('')

      <div style="margin-bottom:${i<alislar.length-1?'24px':'0'}">
        <div style="font-weight:700;font-size:13px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #ccc">

        </div>
        <div class="receipt-row"><span>Ödeme Durumu</span><span><b>${a.odemeDurumu==='odendi'?'✓ Ödendi':a.odemeDurumu==='kismi'?'Kısmi Ödeme':'⚠ Bekliyor'}</b></span></div>
        ${urunSatirlari}

function buildReceipt(lines,title,sub,total,totalLabel,extraRows,kalanBorcInfo){
  const now=new Date().toLocaleString('tr-TR');
  const kalanHtml=kalanBorcInfo!==undefined
    ? `<div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px dashed #ccc;margin-top:4px;font-weight:700;color:${kalanBorcInfo>0?'#b91c1c':'#166534'}">
        <span>Kalan Borç</span><span>${kalanBorcInfo>0?fmt(kalanBorcInfo):'Kalan borç yoktur'}</span>
      </div>` : '';
  return `<div class="receipt">
  <div class="receipt-logo"><h1>🔥 FAVORİ</h1><p>${now}</p></div>
  <div style="text-align:center;margin-bottom:10px;font-size:15px;font-weight:700">${title}</div>
  ${sub?`<div style="text-align:center;font-size:12px;color:#555;margin-bottom:10px">${sub}</div>`:''}
  ${lines.map(([l,v])=>`<div class="receipt-row"><span>${l}</span><span><b>${v}</b></span></div>`).join('')}
  ${extraRows||''}
  ${total!==undefined?`<div class="receipt-total"><span>${totalLabel||'TOPLAM'}</span><span>${fmt(total)}</span></div>`:''}
  ${kalanHtml}
  </div>`;
}

function printDashRapor(donemLabel){
  const pSat=S.satislar.filter(x=>x.tarih>=dashBasTarih&&x.tarih<=dashBitTarih);
  const pAlis=S.alislar.filter(x=>x.tarih>=dashBasTarih&&x.tarih<=dashBitTarih);
  const pGid=S.giderler.filter(x=>x.tarih>=dashBasTarih&&x.tarih<=dashBitTarih);
  const ciro=pSat.reduce((a,x)=>a+x.toplam,0);
  const mal=pAlis.reduce((a,x)=>a+x.toplam,0);
  const gid=pGid.reduce((a,x)=>a+x.tutar,0);
  const kar=ciro-mal-gid;
  const mAl=S.musteriler.reduce((a,x)=>a+(x.toplamBorc-x.odenen),0);
  const sB=S.saticilar.reduce((a,x)=>a+(x.toplamBorc-x.odenen),0);

  // Satış detayları
  const satisRows=pSat.length?`<div style="margin:8px 0 4px;font-weight:700;font-size:12px;border-top:1px solid #ccc;padding-top:8px">SATIŞLAR (${pSat.length} işlem)</div>`
    +[...pSat].sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(s=>`<div class="receipt-row"><span>${fmtDT(s.tarih,s.saat)} — ${s.musteriAd}: ${s.urunAd}</span><span><b>${fmt(s.toplam)}</b></span></div>`).join('') :'';
  const alisRows=pAlis.length?`<div style="margin:8px 0 4px;font-weight:700;font-size:12px;border-top:1px solid #ccc;padding-top:8px">ALIŞLAR (${pAlis.length} işlem)</div>`
    +[...pAlis].sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(a=>`<div class="receipt-row"><span>${fmtDT(a.tarih,a.saat)} — ${a.saticiAd}</span><span><b>${fmt(a.toplam)}</b></span></div>`).join('') :'';

  doPrint(buildReceipt([
    ['Dönem',donemLabel],
    ['Satış Cirosu',fmt(ciro)],
    ['Alış Maliyeti',fmt(mal)],
    ['Gider',fmt(gid)],
    ['Kâr / Zarar',fmt(kar)],
    ['Müşteri Alacağı',fmt(mAl)],
    ['Satıcıya Borç',fmt(sB)],
  ],'GÜNLÜK ÖZET RAPORU',donemLabel,undefined,undefined,satisRows+alisRows));
}

      'SATIŞ FİŞİ',`Fiş No: #${s.id}`,s.toplam,'TOPLAM',null,kalanMusteri));
  } else {

async function loadAll() {
  try {
    const fixDate = d => {
      if(!d) return '';
      const s = String(d);
      if(s.includes('T')) return s.split('T')[0];
      if(s.includes('.')) { const [g,a,y]=s.split('.'); return y+'-'+a+'-'+g; }
      return s;
    };
    const [urunler, musteriler, saticilar, alislar, satislar, giderler] = await Promise.all([
      apiGet('/urunler'), apiGet('/musteriler'), apiGet('/saticilar'),
      apiGet('/alislar'), apiGet('/satislar'), apiGet('/giderler')
    ]);
    S.urunler = (urunler||[]).map(u=>({
      id:u.id, ad:u.ad, kategori:u.kategori||'', birim:u.birim||'Adet',
      stok:parseFloat(u.stok||0), maliyet:parseFloat(u.maliyet||0),
      satisFiyat:parseFloat(u.satisFiyat||u.satis_fiyat||0), sonH:u.sonH||u.son_hareket
    }));
    S.musteriler = (musteriler||[]).map(m=>({
      id:m.id, ad:m.ad, tel:m.tel||'', adres:m.adres||'',
      toplamBorc:parseFloat(m.toplamBorc||m.toplam_borc||0),
      odenen:parseFloat(m.odenen||0)
    }));
    S.saticilar = (saticilar||[]).map(t=>({
      id:t.id, ad:t.ad, tel:t.tel||'',
      toplamBorc:parseFloat(t.toplamBorc||t.toplam_borc||0),
      odenen:parseFloat(t.odenen||0)
    }));
    S.alislar = (alislar||[]).map(a=>({
      id:a.id, tarih:fixDate(a.tarih), saat:a.saat||'',
      saticiId:a.saticiId||a.satici_id,
      saticiAd:a.saticiAd||a.satici_ad||'',
      urunler:a.urunler||[],
      toplam:parseFloat(a.toplam||0),
      odemeDurumu:a.odemeDurumu||a.odeme_durumu||'bekliyor',
      odened:parseFloat(a.odened||0),
      aciklama:a.aciklama||''
    }));
    S.satislar = (satislar||[]).map(s=>({
      id:s.id, tarih:fixDate(s.tarih), saat:s.saat||'',
      musteriId:s.musteriId||s.musteri_id,
      musteriAd:s.musteriAd||s.musteri_ad||'',
      urunId:s.urunId||s.urun_id,
      urunAd:s.urunAd||s.urun_ad||'',
      miktar:parseFloat(s.miktar||0),
      satisFiyat:parseFloat(s.satisFiyat||s.satis_fiyat||0),
      toplam:parseFloat(s.toplam||0),
      odemeDurumu:s.odemeDurumu||s.odeme_durumu||'bekliyor',
      odened:parseFloat(s.odened||0),
      aciklama:s.aciklama||''
    }));
    S.giderler = (giderler||[]).map(g=>({
      id:g.id, tarih:fixDate(g.tarih), saat:g.saat||'',
      aciklama:g.aciklama||'', kategori:g.kategori||'Genel',
      tutar:parseFloat(g.tutar||0)
    }));
    render();
  } catch(e) {
    console.error('Veri yuklenemedi:', e);
    render();
  }
}

function waFisSatis(id){
  const s=S.satislar.find(x=>x.id===id);if(!s)return;
  const mus=S.musteriler.find(x=>x.id===s.musteriId);
  const kalan=s.toplam-(s.odened||0);
  const mesaj=`🧾 *FAVORİ İLETİŞİM FİŞİ*\n\n`+
    `Müşteri: ${s.musteriAd}\n`+
    `Ürün: ${s.urunAd}\n`+
    `Miktar: ${s.miktar} ${S.urunler.find(u=>u.id===s.urunId)?.birim||''}\n`+
    `Birim Fiyat: ${fmt(s.satisFiyat)}\n`+
    `*Toplam: ${fmt(s.toplam)}*\n`+
    (kalan>0?`Kalan Borç: ${fmt(kalan)}\n`:'')+
    `Tarih: ${fmtD(s.tarih)}\n\n`+
    `Teşekkür ederiz! 🙏`;
  const tel=mus?.tel?.replace(/\D/g,'').replace(/^0/,'');
  if(tel){
    window.open(`https://wa.me/90${tel}?text=${encodeURIComponent(mesaj)}`,'_blank');
  } else {
    window.open(`https://wa.me/?text=${encodeURIComponent(mesaj)}`,'_blank');
  }
}

function waBorcHatirlatma(musId){
  const m=S.musteriler.find(x=>x.id===musId);if(!m)return;
  const kalan=m.toplamBorc-m.odenen;
  const mesaj=`Sayın *${m.ad}*,\n\n`+
    `FAVORİ İletişim'den borç hatırlatmasıdır.\n\n`+
    `Toplam Borç: ${fmt(m.toplamBorc)}\n`+
    `Ödenen: ${fmt(m.odenen)}\n`+
    `*Kalan: ${fmt(kalan)}*\n\n`+
    `Lütfen en kısa sürede ödemenizi yapınız.\n`+
    `Teşekkür ederiz. 🙏`;
  const tel=m.tel?.replace(/\D/g,'').replace(/^0/,'');
  if(tel){
    window.open(`https://wa.me/90${tel}?text=${encodeURIComponent(mesaj)}`,'_blank');
  } else {
    alert('Bu müşterinin telefon numarası yok!');
  }
}
